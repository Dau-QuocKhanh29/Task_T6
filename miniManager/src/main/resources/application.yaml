server:
  port: 8080

spring:
  application:
    name: crm

  datasource:
    url: jdbc:mysql://localhost:3306/voucher_db
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

    database-platform: org.hibernate.dialect.MySQLDialect